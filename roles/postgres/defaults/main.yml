---
# PostgreSQL + Patroni + etcd Deployment
# Default variables for air-gapped deployment with Harness TSDB migration extensions

# PostgreSQL Configuration
postgres_version: "14.11"
postgres_tarball: "postgresql-{{ postgres_version }}.tar.gz"
postgres_cluster_size: 3  # 1 for standalone, 3 for HA cluster
postgres_port: 5432

# Installation Paths
postgres_install_dir: "/usr/local/pgsql"
postgres_bin_dir: "{{ postgres_install_dir }}/bin"
postgres_data_dir: "/var/lib/postgresql/14/main"
postgres_log_dir: "/var/log/postgresql"
postgres_config_dir: "/etc/postgresql"

# Authentication
postgres_superuser: "postgres"
postgres_superuser_password: "postgres_secure_pass"
postgres_replication_user: "replicator"
postgres_replication_password: "repl_pass"

# DNS Configuration
postgres_dns_name: "{{ inventory_hostname }}"

# Patroni Configuration (3-node HA only)
patroni_enabled: "{{ postgres_cluster_size > 1 }}"
patroni_scope: "postgres-cluster"
patroni_restapi_port: 8008
patroni_config_dir: "/etc/patroni"

# etcd Configuration (3-node HA only)
etcd_enabled: "{{ postgres_cluster_size > 1 }}"
etcd_version: "3.5.12"
etcd_tarball: "etcd-v{{ etcd_version }}-linux-amd64.tar.gz"
etcd_client_port: 2379
etcd_peer_port: 2380
etcd_data_dir: "/var/lib/etcd"

# PostgreSQL Extensions for Harness TSDB Migration
postgres_extensions_enabled: true
postgres_extensions:
  pg_cron:
    version: "1.6.0"
    tarball: "pg_cron-1.6.0.tar.gz"
    preload_required: true
    description: "Job scheduler for PostgreSQL"
  pg_partman:
    version: "5.2.4"
    tarball: "pg_partman-5.2.4.tar.gz"
    preload_required: false
    description: "Partition management for time-series data"
  hstore:
    version: "1.8"
    builtin: true  # Part of contrib, no download needed
    preload_required: false
    description: "Key-value store data type"

# Backup and Restore
postgres_restore_backup_path: ""
postgres_restore_type: "basebackup"  # or "dump"

# Upgrade
postgres_upgrade_target_version: ""

# System Resources
postgres_shared_buffers_ratio: 0.25  # 25% of total memory
postgres_effective_cache_size_ratio: 0.75  # 75% of total memory
