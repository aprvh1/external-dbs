---
# Configure Redis Sentinel (3-node only)

- name: Deploy Sentinel configuration
  template:
    src: sentinel.conf.j2
    dest: "{{ redis_config_dir }}/sentinel.conf"
    owner: "{{ redis_user }}"
    group: "{{ redis_group }}"
    mode: '0640'
  notify: restart sentinel

- name: Deploy Sentinel systemd service
  template:
    src: sentinel.service.j2
    dest: "{{ redis_systemd_dir }}/{{ redis_sentinel_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
